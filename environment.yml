name: wave-energy-storage-ml

channels:
  - conda-forge

dependencies:
  - python=3.12
  - pip

  - pip:
      # Jupyter workflow
      - jupyterlab
      - ipykernel
      - ipywidgets
      - tabulate

      # Forecasting / machine learning
      - scikit-learn
      - statsmodels

      # Utilities
      - tqdm

      # Copernicus Marine data access
      - copernicusmarine

      # Earth relief/bathymetry data for map
      - cartopy

      # Battery simulation
      - simses==2.1.1
