name: wave-energy-storage-ml

channels:
  - conda-forge

dependencies:
  - python=3.11
  - pip
  - git

  - pip:
      # Jupyter workflow
      - jupyterlab
      - ipykernel

      # Forecasting / machine learning
      - scikit-learn
      - statsmodels

      # Utilities
      - tqdm

      # Marine-energy toolkit from GitHub source, with all optional dependencies
      - "mhkit[all] @ git+https://github.com/MHKiT-Software/MHKiT-Python.git"
